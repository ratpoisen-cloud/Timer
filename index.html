<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Без предложения руки и сердца</title>
  <link rel="icon" href="favicon.png" type="image/png" />
  <style>
    :root {
      --bg-1: #ffffff;
      --bg-2: #f7f5f2;
      --bg-3: #efeae3;
      --text: #4b5563;
      --text-strong: #374151;
      --muted: #8b95a7;
      --card-bg: rgba(255, 255, 255, 0.58);
      --glass-strong: rgba(255, 255, 255, 0.92);
      --line: rgba(255, 255, 255, 0.72);
      --card-line: rgba(148, 163, 184, 0.1);
      --shadow: 0 20px 50px rgba(15, 23, 42, 0.07);
      --gold-1: #f4d77a;
      --gold-2: #d4af37;
      --gold-3: #b88b16;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, var(--bg-1) 0%, var(--bg-2) 36%, var(--bg-3) 100%);
    }

    body {
      position: relative;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(70px);
      pointer-events: none;
      opacity: 0.55;
    }

    .orb-1 {
      top: -40px;
      left: 50%;
      width: 280px;
      height: 280px;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.95);
    }

    .orb-2 {
      left: -40px;
      top: 22%;
      width: 220px;
      height: 220px;
      background: rgba(245, 240, 230, 0.95);
    }

    .orb-3 {
      right: -40px;
      bottom: 8%;
      width: 220px;
      height: 220px;
      background: rgba(255, 237, 213, 0.78);
    }

    .app {
      position: relative;
      z-index: 2;
      width: min(1100px, 100%);
      height: 100dvh;
      margin: 0 auto;
      padding: max(16px, env(safe-area-inset-top)) 16px max(16px, env(safe-area-inset-bottom)) 16px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 18px;
    }

    .settings-btn {
      position: fixed;
      right: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 30;
      width: 48px;
      height: 48px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(12px);
      box-shadow: 0 12px 30px rgba(148, 163, 184, 0.14);
      display: grid;
      place-items: center;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .settings-btn:hover {
      transform: scale(1.04);
      background: rgba(255, 255, 255, 0.94);
    }

    .settings-btn:active {
      transform: scale(0.97);
    }

    .settings-btn svg {
      width: 21px;
      height: 21px;
      stroke: #475569;
    }

    .counter-block {
      padding-top: 40px;
      text-align: center;
      align-self: start;
    }

    .counter-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px 14px;
    }

    .counter-item {
      text-align: center;
      background: var(--card-bg);
      border: 1px solid var(--card-line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      padding: 20px 12px 18px;
    }

    .counter-value {
      font-size: clamp(3.6rem, 10.5vw, 5.8rem);
      line-height: 0.92;
      font-weight: 700;
      letter-spacing: -0.055em;
      color: var(--text-strong);
    }

    .counter-label {
      margin-top: 12px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .slideshow-shell {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slideshow {
      position: relative;
      width: 100%;
      height: 100%;
      min-height: 220px;
      max-height: 42dvh;
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transform: scale(1.03);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .slide.active {
      opacity: 1;
      transform: scale(1);
    }

    .slide-overlay {
      position: absolute;
      inset: auto 0 0 0;
      height: 96px;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.18), transparent);
      pointer-events: none;
    }

    .dots {
      position: absolute;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(10px);
      z-index: 3;
    }

    .dot {
      width: 10px;
      height: 10px;
      border: 0;
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.65);
      padding: 0;
      cursor: pointer;
      transition: width 0.2s ease, background 0.2s ease;
    }

    .dot.active {
      width: 24px;
      background: #475569;
    }

    .footer-block {
      padding-bottom: 4px;
      text-align: center;
      align-self: end;
    }

    .footer-block h1 {
      margin: 0;
      font-size: clamp(2.2rem, 5vw, 3.45rem);
      line-height: 0.98;
      font-weight: 700;
      letter-spacing: -0.05em;
      color: var(--text-strong);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.24);
      backdrop-filter: blur(2px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease;
      z-index: 40;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal {
      position: fixed;
      left: 50%;
      top: 10%;
      transform: translateX(-50%) translateY(12px) scale(0.98);
      width: min(92vw, 460px);
      padding: 20px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.16);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
      z-index: 50;
    }

    .modal.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .modal-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 16px;
    }

    .modal-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0;
      color: var(--text-strong);
    }

    .modal-subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .close-btn {
      width: 38px;
      height: 38px;
      border: 0;
      border-radius: 999px;
      background: transparent;
      cursor: pointer;
      color: #64748b;
      font-size: 22px;
      line-height: 1;
    }

    .close-btn:hover {
      background: #f5f5f4;
      color: var(--text-strong);
    }

    label {
      display: block;
      font-size: 0.95rem;
      font-weight: 500;
      color: #475569;
      margin-bottom: 8px;
    }

    input[type="datetime-local"] {
      width: 100%;
      margin-top: 8px;
      border: 1px solid #e7e5e4;
      border-radius: 18px;
      background: #fafaf9;
      padding: 14px 16px;
      font: inherit;
      color: var(--text-strong);
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
    }

    input[type="datetime-local"]:focus {
      border-color: #cbd5e1;
      background: #fff;
      box-shadow: 0 0 0 4px #f5f5f4;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 18px;
    }

    .btn {
      border: 0;
      border-radius: 18px;
      padding: 14px 16px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
    }

    .btn-primary {
      background: #475569;
      color: white;
    }

    .btn-primary:hover {
      background: #526174;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #fff;
      color: #475569;
      border: 1px solid #e7e5e4;
    }

    .btn-secondary:hover {
      background: #fafaf9;
    }

    .ring-layer {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 20;
    }

    .ring-particle {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
      will-change: transform, opacity;
      animation: ring-fall var(--duration) ease-in forwards;
    }

    @keyframes ring-fall {
      0% {
        opacity: 0;
        transform: translate3d(0, 0, 0) scale(0.72) rotate(var(--start-rotate));
      }
      12% {
        opacity: 1;
      }
      82% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translate3d(var(--drift), var(--drop), 0) scale(0.92) rotate(var(--end-rotate));
      }
    }

    @media (min-width: 760px) {
      .app {
        padding-left: 24px;
        padding-right: 24px;
        gap: 22px;
      }

      .counter-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 20px;
      }

      .actions {
        flex-direction: row;
      }

      .btn {
        flex: 1;
      }
    }

    @media (max-width: 640px) {
      .app {
        gap: 14px;
      }

      .counter-block {
        padding-top: 44px;
      }

      .counter-item {
        padding: 18px 10px 16px;
        border-radius: 24px;
      }

      .counter-value {
        font-size: clamp(4rem, 13vw, 5rem);
      }

      .counter-label {
        font-size: 12px;
        letter-spacing: 0.26em;
      }

      .slideshow {
        max-height: 36dvh;
      }

      .footer-block h1 {
        font-size: clamp(2.5rem, 8.6vw, 3.3rem);
      }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <button class="settings-btn" id="openSettings" aria-label="Настроить дату">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.33 1V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-.33-1 1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.82.33l-.06.06A2 2 0 1 1 3.63 17l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 0-1-.33H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1-.33 1.65 1.65 0 0 0 .6-1 1.65 1.65 0 0 0-.33-1.82L4.3 6.46A2 2 0 1 1 7.12 3.63l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 0 .33-1V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 .33 1 1.65 1.65 0 0 0 1 .6 1.65 1.65 0 0 0 1.82-.33l.06-.06A2 2 0 1 1 20.37 7.12l-.06.06A1.65 1.65 0 0 0 19.4 9c0 .38.13.74.37 1a1.65 1.65 0 0 0 1 .33H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1 .33c-.24.26-.37.62-.37 1Z"></path>
    </svg>
  </button>

  <main class="app">
    <section class="counter-block">
      <div class="counter-grid">
        <div class="counter-item">
          <div class="counter-value" id="days">0</div>
          <div class="counter-label">Дней</div>
        </div>
        <div class="counter-item">
          <div class="counter-value" id="hours">00</div>
          <div class="counter-label">Часов</div>
        </div>
        <div class="counter-item">
          <div class="counter-value" id="minutes">00</div>
          <div class="counter-label">Минут</div>
        </div>
        <div class="counter-item">
          <div class="counter-value" id="seconds">00</div>
          <div class="counter-label">Секунд</div>
        </div>
      </div>
    </section>

    <section class="slideshow-shell">
      <div class="slideshow" id="slideshow">
        <img class="slide active" src="assets/1.jpg" alt="Слайд 1" />
        <img class="slide" src="assets/2.jpg" alt="Слайд 2" />
        <img class="slide" src="assets/3.jpg" alt="Слайд 3" />
        <img class="slide" src="assets/4.jpg" alt="Слайд 4" />
        <img class="slide" src="assets/5.jpg" alt="Слайд 5" />
        <div class="slide-overlay"></div>
        <div class="dots" id="dots"></div>
      </div>
    </section>

    <section class="footer-block">
      <h1>Без предложения руки и сердца</h1>
    </section>
  </main>

  <div class="modal-backdrop" id="backdrop"></div>
  <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-header">
      <div>
        <h2 class="modal-title" id="modalTitle">Настройка даты</h2>
        <p class="modal-subtitle">Выбери дату, от которой идёт отсчёт.</p>
      </div>
      <button class="close-btn" id="closeSettings" aria-label="Закрыть">×</button>
    </div>

    <label>
      Дата и время
      <input type="datetime-local" id="dateInput" />
    </label>

    <div class="actions">
      <button class="btn btn-primary" id="saveDate">Сохранить</button>
      <button class="btn btn-secondary" id="resetDate">Сбросить</button>
    </div>
  </div>

  <div class="ring-layer" id="ringLayer" aria-hidden="true"></div>

  <template id="ringTemplate">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="ringGoldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#f4d77a" />
          <stop offset="45%" stop-color="#d4af37" />
          <stop offset="100%" stop-color="#b88b16" />
        </linearGradient>
        <linearGradient id="diamondGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#ffffff" />
          <stop offset="100%" stop-color="#dce9ff" />
        </linearGradient>
      </defs>
      <circle cx="32" cy="38" r="16" fill="none" stroke="url(#ringGoldGradient)" stroke-width="7" stroke-linecap="round" />
      <circle cx="32" cy="38" r="11" fill="rgba(255,255,255,0.68)" />
      <path d="M32 10 L38 18 L32 26 L26 18 Z" fill="url(#diamondGradient)" stroke="rgba(176,197,234,0.95)" stroke-width="1.4" />
      <path d="M29.3 18 L34.7 18" stroke="rgba(212,175,55,0.9)" stroke-width="2" stroke-linecap="round" />
    </svg>
  </template>

  <script>
    (function () {
      const STORAGE_KEY = 'engagement-counter-start-date';
      const DEFAULT_DATE = '2025-01-01T00:00';
      const SLIDE_INTERVAL = 3500;
      const slides = Array.from(document.querySelectorAll('.slide'));
      const dotsContainer = document.getElementById('dots');
      const ringLayer = document.getElementById('ringLayer');
      const ringTemplate = document.getElementById('ringTemplate');

      const daysEl = document.getElementById('days');
      const hoursEl = document.getElementById('hours');
      const minutesEl = document.getElementById('minutes');
      const secondsEl = document.getElementById('seconds');

      const openSettingsBtn = document.getElementById('openSettings');
      const closeSettingsBtn = document.getElementById('closeSettings');
      const backdrop = document.getElementById('backdrop');
      const modal = document.getElementById('modal');
      const dateInput = document.getElementById('dateInput');
      const saveDateBtn = document.getElementById('saveDate');
      const resetDateBtn = document.getElementById('resetDate');

      let startDate = loadDate();
      let currentSlide = 0;
      let lastRingTime = 0;

      function pad(value) {
        return String(value).padStart(2, '0');
      }

      function formatInputValue(date) {
        const year = date.getFullYear();
        const month = pad(date.getMonth() + 1);
        const day = pad(date.getDate());
        const hours = pad(date.getHours());
        const minutes = pad(date.getMinutes());
        return `${year}-${month}-${day}T${hours}:${minutes}`;
      }

      function loadDate() {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = new Date(saved);
          if (!Number.isNaN(parsed.getTime())) return parsed;
        }
        return new Date(DEFAULT_DATE);
      }

      function saveDate(date) {
        startDate = date;
        localStorage.setItem(STORAGE_KEY, date.toISOString());
      }

      function updateCounter() {
        const now = new Date();
        const diff = Math.max(0, now.getTime() - startDate.getTime());
        const totalSeconds = Math.floor(diff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;

        daysEl.textContent = String(days);
        hoursEl.textContent = pad(hours);
        minutesEl.textContent = pad(minutes);
        secondsEl.textContent = pad(seconds);
      }

      function buildDots() {
        slides.forEach((_, index) => {
          const btn = document.createElement('button');
          btn.className = `dot${index === 0 ? ' active' : ''}`;
          btn.type = 'button';
          btn.setAttribute('aria-label', `Переключить на слайд ${index + 1}`);
          btn.addEventListener('click', () => {
            goToSlide(index);
            restartSlideshow();
          });
          dotsContainer.appendChild(btn);
        });
      }

      function goToSlide(index) {
        currentSlide = index;
        slides.forEach((slide, i) => {
          slide.classList.toggle('active', i === index);
        });
        Array.from(dotsContainer.children).forEach((dot, i) => {
          dot.classList.toggle('active', i === index);
        });
      }

      let slideshowTimer = null;
      function startSlideshow() {
        slideshowTimer = window.setInterval(() => {
          goToSlide((currentSlide + 1) % slides.length);
        }, SLIDE_INTERVAL);
      }

      function restartSlideshow() {
        if (slideshowTimer) clearInterval(slideshowTimer);
        startSlideshow();
      }

      function openModal() {
        dateInput.value = formatInputValue(startDate);
        modal.classList.add('open');
        backdrop.classList.add('open');
      }

      function closeModal() {
        modal.classList.remove('open');
        backdrop.classList.remove('open');
      }

      function createRing(x, y) {
        const now = Date.now();
        if (now - lastRingTime < 170) return;
        lastRingTime = now;

        const size = 16 + Math.random() * 14;
        const duration = 1.8 + Math.random() * 1.2;
        const drift = -28 + Math.random() * 56;
        const startRotate = -40 + Math.random() * 80;
        const endRotate = startRotate + (-70 + Math.random() * 140);
        const drop = window.innerHeight - y + 70;

        const particle = document.createElement('div');
        particle.className = 'ring-particle';
        particle.style.left = `${x}px`;
        particle.style.top = `${y}px`;
        particle.style.width = `${size}px`;
        particle.style.height = `${size}px`;
        particle.style.setProperty('--duration', `${duration}s`);
        particle.style.setProperty('--drift', `${drift}px`);
        particle.style.setProperty('--drop', `${drop}px`);
        particle.style.setProperty('--start-rotate', `${startRotate}deg`);
        particle.style.setProperty('--end-rotate', `${endRotate}deg`);
        particle.innerHTML = ringTemplate.innerHTML;

        const svg = particle.querySelector('svg');
        if (svg) {
          svg.setAttribute('width', String(size));
          svg.setAttribute('height', String(size));
        }

        ringLayer.appendChild(particle);
        window.setTimeout(() => particle.remove(), duration * 1000 + 300);
      }

      function handlePointerMove(event) {
        createRing(event.clientX, event.clientY);
      }

      function handleTouchMove(event) {
        const touch = event.touches[0];
        if (touch) createRing(touch.clientX, touch.clientY);
      }

      function handleScroll() {
        const x = window.innerWidth * (0.25 + Math.random() * 0.5);
        const y = Math.min(window.innerHeight - 40, 70 + Math.random() * 120);
        createRing(x, y);
      }

      buildDots();
      goToSlide(0);
      startSlideshow();
      updateCounter();
      setInterval(updateCounter, 1000);

      openSettingsBtn.addEventListener('click', openModal);
      closeSettingsBtn.addEventListener('click', closeModal);
      backdrop.addEventListener('click', closeModal);

      saveDateBtn.addEventListener('click', () => {
        const parsed = new Date(dateInput.value);
        if (Number.isNaN(parsed.getTime())) return;
        saveDate(parsed);
        updateCounter();
        closeModal();
      });

      resetDateBtn.addEventListener('click', () => {
        const fallback = new Date(DEFAULT_DATE);
        saveDate(fallback);
        dateInput.value = formatInputValue(fallback);
        updateCounter();
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape') closeModal();
      });

      window.addEventListener('pointermove', handlePointerMove, { passive: true });
      window.addEventListener('touchmove', handleTouchMove, { passive: true });
      window.addEventListener('scroll', handleScroll, { passive: true });
    })();
  </script>
</body>
</html>
